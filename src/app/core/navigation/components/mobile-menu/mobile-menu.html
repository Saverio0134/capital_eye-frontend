@if (moreMenuOpen()) {
  <button
    type="button"
    aria-label="Chiudi menu"
    class="fixed inset-x-0 top-0 bottom-24 z-40 bg-primary/20"
    (click)="closeDrawer()"
  ></button>
}

<div class="fixed inset-x-0 bottom-0 border-t-2 border-black bg-on-primary px-3 pb-4 pt-3 z-3333">
  <div class="grid grid-cols-5 gap-2">
    @for (item of primaryItems(); track item.id) {
      <button
        pButton
        class="flex min-h-16 flex-col items-center justify-center gap-1"
        routerLinkActive
        #nav="routerLinkActive"
        [routerLink]="item.routerLink"
        [class.ce-button-outlined]="!nav.isActive"
        [class.ce-button]="nav.isActive"
        (click)="moreMenuOpen() ? closeDrawer() : null"
      >
        <lucide-icon class="h-8 w-8" [img]="item.icon"></lucide-icon>
        <span class="text-[11px] leading-none">{{ item.mobileLabel }}</span>
      </button>
    }

    <button
      pButton
      class="flex min-h-16 flex-col items-center justify-center gap-1"
      [class.ce-button]="moreMenuOpen()"
      [class.ce-button-outlined]="!moreMenuOpen()"
      (click)="moreMenuOpen() ? closeDrawer() : openMoreRequested.emit()"
    >
      <lucide-icon class="h-8 w-8" [img]="moreIcon"></lucide-icon>
      <span class="text-[11px] leading-none">Altro</span>
    </button>
  </div>
</div>

<p-drawer
  header="Altro"
  position="bottom"
  [visible]="moreMenuOpen()"
  [appendTo]="'body'"
  [modal]="false"
  [dismissible]="false"
  [blockScroll]="true"
  [baseZIndex]="50"
  [styleClass]="'!bottom-22 !left-3 !right-3 !w-auto ce-container-outlined p-4 h-max'"
  (visibleChange)="requestDrawerState($event)"
  [showCloseIcon]="false"
>
  <div class="flex flex-col gap-3 pb-2">
    @for (item of secondaryItems(); track item.id) {
      <button
        pButton
        class="w-full justify-start"
        routerLinkActive
        #secondaryNav="routerLinkActive"
        [routerLink]="item.routerLink"
        [class.ce-button-outlined]="!secondaryNav.isActive"
        [class.ce-button]="secondaryNav.isActive"
        (click)="closeDrawer()"
      >
        <lucide-icon [img]="item.icon"></lucide-icon>
        <span>{{ item.label }}</span>
      </button>
    }

    @for (item of secondaryActions(); track item.id) {
      <button
        pButton
        class="ce-button-outlined w-full justify-start"
        (click)="onAction(item.action)"
      >
        <lucide-icon [img]="item.icon"></lucide-icon>
        <span>{{ item.label }}</span>
      </button>
    }
  </div>
</p-drawer>
