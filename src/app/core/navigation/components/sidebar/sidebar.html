<aside class="h-screen border-r-2 border-black p-4">
  <nav class="flex h-full flex-col justify-between gap-8">
    <div class="space-y-8">
      <div class="flex flex-row justify-center gap-2 xl:justify-start">
        <lucide-icon class="h-7 w-7" [img]="brandIcon()"></lucide-icon>
        <span class="hidden text-2xl xl:block">CapitalEye</span>
      </div>

      <div class="flex flex-col gap-3">
        @for (item of primaryItems(); track item.id) {
          <button
            pButton
            class="w-full items-center justify-start"
            routerLinkActive
            #nav="routerLinkActive"
            [routerLink]="item.routerLink"
            [class.ce-button-outlined]="!nav.isActive"
            [class.ce-button]="nav.isActive"
          >
            <lucide-icon [img]="item.icon"></lucide-icon>
            <span class="hidden xl:block">{{ item.label }}</span>
          </button>
        }
      </div>
    </div>

    <div class="flex flex-col gap-1 xl:flex-row">
      @for (item of secondaryItems(); track item.id) {
        <button
          pButton
          class="grow items-center justify-start"
          routerLinkActive
          #secondaryNav="routerLinkActive"
          [routerLink]="item.routerLink"
          [class.ce-button-outlined]="!secondaryNav.isActive"
          [class.ce-button]="secondaryNav.isActive"
        >
          <lucide-icon [img]="item.icon"></lucide-icon>
          <span class="hidden xl:block">{{ item.label }}</span>
        </button>
      }

      @for (item of secondaryActions(); track item.id) {
        <button
          pButton
          class="ce-button-outlined items-center justify-start"
          (click)="onAction(item.action)"
        >
          <lucide-icon [img]="item.icon"></lucide-icon>
          <!-- <span class="hidden xl:block">{{ item.label }}</span> -->
        </button>
      }
    </div>
  </nav>
</aside>
