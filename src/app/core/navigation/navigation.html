<app-navigation-sidebar
  class="hidden md:block md:fixed md:inset-y-0 md:left-0 md:z-40 md:w-20 xl:w-64"
  [brandIcon]="brandIcon"
  [primaryItems]="primaryItems"
  [secondaryItems]="secondaryItems"
  [secondaryActions]="secondaryActions"
  (actionTriggered)="handleAction($event)"
></app-navigation-sidebar>

<app-navigation-mobile-menu
  class="md:hidden"
  [primaryItems]="primaryItems"
  [secondaryItems]="secondaryItems"
  [secondaryActions]="secondaryActions"
  [moreMenuOpen]="isMoreMenuOpen()"
  (openMoreRequested)="openMoreMenu()"
  (closeMoreRequested)="closeMoreMenu()"
  (actionTriggered)="handleAction($event)"
></app-navigation-mobile-menu>
