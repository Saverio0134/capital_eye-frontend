<p-toast
  [key]="apiErrorToastKey"
  position="top-center"
  [life]="apiErrorToastLife"
  [breakpoints]="apiErrorToastBreakpoints"
  [motionOptions]="apiErrorToastMotionOptions"
  [baseZIndex]="3000"
  [preventDuplicates]="true"
>
  <ng-template let-message #headless>
    <div class="flex flex-col p-2 gap-2">
      <span class="font-bold">{{ message.summary }}</span>
      <span class="text-sm">{{ message.detail }}</span>
    </div>
  </ng-template></p-toast
>
