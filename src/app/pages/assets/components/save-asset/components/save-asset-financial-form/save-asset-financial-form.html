<div class="space-y-5">
  <div class="grid grid-cols-1 gap-5 md:grid-cols-2">
    <div class="flex flex-col gap-2">
      <label for="asset-ticker" class="text-xs font-bold uppercase">TICKER</label>
      <input
        id="asset-ticker"
        pInputText
        type="text"
        class="ce-input w-full uppercase"
        [class.p-invalid]="invalidField(form().ticker)"
        [placeholder]="
          form().type().value() === AssetType.STOCK || form().type().value() === AssetType.CRYPTO
            ? 'Obbligatorio'
            : 'Opzionale'
        "
        [formField]="form().ticker"
      />
      @if (form().ticker().touched()) {
        @for (error of form().ticker().errors(); track error.kind) {
          <div role="alert" class="text-xs font-semibold text-red-900">
            {{ error.message }}
          </div>
        }
      }
    </div>

    <div class="flex flex-col gap-2">
      <label for="asset-tax-rate" class="text-xs font-bold uppercase">ALIQUOTA IMPOSTA %</label>
      <p-inputnumber
        inputId="asset-tax-rate"
        [minFractionDigits]="0"
        [maxFractionDigits]="2"
        class="w-full"
        [class.p-invalid]="invalidField(form().taxRate)"
        inputStyleClass="ce-input w-full"
        [formField]="$any(form().taxRate)"
      />
      @if (form().taxRate().touched()) {
        @for (error of form().taxRate().errors(); track error.kind) {
          <div role="alert" class="text-xs font-semibold text-red-900">
            {{ error.message }}
          </div>
        }
      }
    </div>
  </div>

  <!-- Mostra la posizione iniziale solo se esiste un conto selezionato -->
  @if (showInitialPositionFields()) {
    <app-save-asset-initial-position-form [form]="form()" />
  }
</div>
