<div class="space-y-4 border-2 border-primary p-4">
  <div class="flex flex-col gap-1">
    <span class="text-xs font-bold uppercase">POSIZIONE INIZIALE</span>
    <span class="text-xs">{{ quantityHint() }}</span>
  </div>

  <div class="grid grid-cols-1 gap-5 md:grid-cols-2">
    <div class="flex flex-col gap-2">
      <label for="asset-quantity" class="text-xs font-bold uppercase">{{ quantityLabel() }}</label>
      <p-inputnumber
        inputId="asset-quantity"
        [minFractionDigits]="0"
        [maxFractionDigits]="8"
        class="w-full"
        [class.p-invalid]="invalidField(form().quantity)"
        inputStyleClass="ce-input w-full"
        [formField]="$any(form().quantity)"
      />
      <!-- Mostra gli errori della quantita -->
      @if (form().quantity().touched()) {
        @for (error of form().quantity().errors(); track error.kind) {
          <div role="alert" class="text-xs font-semibold text-red-900">
            {{ error.message }}
          </div>
        }
      }
    </div>

    <div class="flex flex-col gap-2">
      <label for="asset-average-buy-price" class="text-xs font-bold uppercase">PMC INIZIALE</label>
      <p-inputnumber
        inputId="asset-average-buy-price"
        [minFractionDigits]="2"
        [maxFractionDigits]="6"
        class="w-full"
        [class.p-invalid]="invalidField(form().averageBuyPrice)"
        inputStyleClass="ce-input w-full"
        [formField]="$any(form().averageBuyPrice)"
      />
      <!-- Mostra gli errori del PMC -->
      @if (form().averageBuyPrice().touched()) {
        @for (error of form().averageBuyPrice().errors(); track error.kind) {
          <div role="alert" class="text-xs font-semibold text-red-900">
            {{ error.message }}
          </div>
        }
      }
    </div>
  </div>
</div>
